# ConfiguraÁ„o do banco MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/forumhub?createDatabaseIfNotExist=true&serverTimezone=America/Sao_Paulo
spring.datasource.username=seu login
spring.datasource.password=sua senha

# JPA/Hibernate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=validate

# Flyway (migrations)
#spring.flyway.enabled=true
#spring.flyway.locations=classpath:db/migration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.repair-on-migrate=true

# JWT
api.security.token.secret=${JWT_SECRET:12345678}
api.security.token.expiration=7200000

# Server
server.error.include-stacktrace=never

# Logs detalhados para debug
logging.level.org.springframework.security=DEBUG
logging.level.br.com.alura.challengeHub=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Mostrar erros completos
server.error.include-stacktrace=always
server.error.include-message=always